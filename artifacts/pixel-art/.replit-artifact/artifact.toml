kind = "web"
previewPath = "/"
title = "AI Pixel Art Converter"
version = "1.0.0"
id = "artifacts/pixel-art"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20095

[services.development]
run = "pnpm --filter @workspace/pixel-art run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pixel-art", "run", "build" ]
publicDir = "artifacts/pixel-art/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20095"
BASE_PATH = "/"
